params:
  - config.yaml

stages:
  data_load:
    cmd: uv run python -m src.stages.data_load
    deps:
      - src/stages/data_load.py
      - src/data/make_dataset.py
      - config.yaml
    params:
      - config.yaml:
          - paths  
    outs:
      - data/interim/train_raw.csv
      - data/interim/test_raw.csv

  preprocess:
    cmd: uv run python -m src.stages.data_preprocess
    deps:
      - src/stages/data_preprocess.py
      - src/features/
      - data/interim/train_raw.csv
      - data/interim/test_raw.csv
    params:
      - config.yaml:
          - params 
    outs:
      - data/processed/train_processed.csv
      - data/processed/test_processed.csv
      - models/preprocessor.joblib
      
  train:
    cmd: uv run python -m src.stages.train
    deps:
      - src/stages/train.py
      - data/processed/train_processed.csv
    params:
      - config.yaml:
          - model_params 
          - params       
    outs:
      - models/model.joblib

  evaluate:
    cmd: uv run python -m src.stages.evaluate
    deps:
      - src/stages/evaluate.py
      - data/processed/test_processed.csv
      - models/model.joblib
    params:
      - config.yaml:
          - paths       
    metrics:
      - reports/metrics.json:
          cache: false
    outs:
      - reports/metrics.txt:
          cache: false